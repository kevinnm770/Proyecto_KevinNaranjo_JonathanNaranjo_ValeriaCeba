# Levanta una base de datos MySQL lista para usar.
# Comando para iniciarla:   docker compose up -d
# Comando para apagarla:    docker compose down
# Los datos se guardan en el volumen "tienda_db_data" (no se borran al apagar).
services:
  mysql:
    image: mysql:8.0
    container_name: tienda_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tiendadb
      MYSQL_USER: tienda
      MYSQL_PASSWORD: tienda123
    ports:
      - "3306:3306"
    volumes:
      - tienda_db_data:/var/lib/mysql

volumes:
  tienda_db_data:
