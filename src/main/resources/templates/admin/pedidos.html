






<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Pedidos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="container">
    <header class="topbar">
        <h1>Pedidos (Administrador)</h1>
        <a class="btn" th:href="@{/admin/productos}">Ver inventario</a>
    </header>

    <table class="tabla">
        <thead>
        <tr>
            <th># Pedido</th>
            <th>Cliente ID</th>
            <th>Estado</th>
            <th>Total</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ped : ${pedidos}">
            <td th:text="${ped.id}">1</td>
            <td th:text="${ped.usuarioId}">1</td>
            <td th:text="${ped.estado}">NUEVO</td>
            <td th:text="'$' + ${ped.total}">$0</td>
            <td>
                <form th:action="@{/admin/pedidos/estado}" method="post">
                    <input type="hidden" name="pedidoId" th:value="${ped.id}"/>

                    <button th:if="${ped.estado.name() == 'NUEVO'}"
                            class="btn" type="submit" name="nuevoEstado" value="EN_PREPARACION">
                        Pasar a EN_PREPARACION
                    </button>

                    <button th:if="${ped.estado.name() == 'EN_PREPARACION'}"
                            class="btn" type="submit" name="nuevoEstado" value="ENTREGADO">
                        Pasar a ENTREGADO
                    </button>

                    <span th:if="${ped.estado.name() == 'ENTREGADO'}">Completado</span>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(pedidos)}">
            <td colspan="5">No hay pedidos registrados.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
