<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TecnoTienda</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="container">
    <h1>TecnoTienda</h1>
    <p>Bienvenido a tu tienda de componentes electrónicos y hardware.</p>
    <p>Encontrá procesadores, tarjetas de video, memorias RAM, almacenamiento y más.</p>

    <p th:if="${param.logout}" class="ok">Sesión cerrada correctamente.</p>

    <nav>
        <a class="btn" th:href="@{/login}">Iniciar sesión</a>
        <a class="btn" th:href="@{/registro}">Crear cuenta</a>
    </nav>
</div>
</body>
</html>
