<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - TecnoTienda</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="container">
    <h1>Iniciar sesión</h1>

    <p th:if="${param.registrado}" class="ok">Cuenta creada exitosamente. Ya podés iniciar sesión.</p>
    <p th:if="${param.error}" class="error">Usuario o contraseña incorrectos.</p>

    <form th:action="@{/login}" method="post" class="form">
        <label>Usuario</label>
        <input type="text" name="username" required/>
        <label>Contraseña</label>
        <input type="password" name="password" required/>
        <button type="submit" class="btn">Entrar</button>
    </form>

    <p><a th:href="@{/registro}">¿No tenés cuenta? Registrate</a></p>
    <p><a th:href="@{/}">Volver al inicio</a></p>
</div>
</body>
</html>
