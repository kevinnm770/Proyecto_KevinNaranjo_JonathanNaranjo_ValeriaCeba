spring.application.name=TiendaPedidos

# Idioma / Locale
spring.web.locale=es_CR
spring.web.locale-resolver=fixed

# Inicializacion de la base de datos con scripts SQL (schema.sql y data.sql)
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.encoding=UTF-8

# Conexion a MySQL (la base corre en Docker, ver docker-compose.yml)
spring.datasource.url=jdbc:mysql://localhost:3306/tiendadb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USR_NAME:tienda}
spring.datasource.password=${DB_PWD:tienda123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostrar mensajes utiles en consola mientras desarrollamos
logging.level.org.springframework.jdbc.core=INFO
